<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Umpire Log">
<meta name="theme-color" content="#0f1923">
<title>Umpire Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --surface: #172130;
  --surface2: #1e2d3d;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text: #e8edf2;
  --text-muted: #7a9bb5;
  --text-dim: #4a6478;
  --accent: #3eb8ff;
  --accent-dim: rgba(62,184,255,0.12);
  --accent-border: rgba(62,184,255,0.3);
  --green: #4cd7a0;
  --green-dim: rgba(76,215,160,0.12);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --red: #ff5f5f;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* Header */
.header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
.header-left { display: flex; align-items: baseline; gap: 10px; }
.logo { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.season-tag { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; background: var(--surface2); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); }

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  gap: 0;
  flex-shrink: 0;
  background: var(--bg);
}
.tab {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  padding: 10px 16px 9px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  margin-bottom: -1px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text-muted); }

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stat-cell {
  background: var(--bg);
  padding: 12px 16px;
  text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); line-height: 1; }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

/* Main scroll area */
.main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.pane { display: none; }
.pane.active { display: block; }

/* Add form */
.form-wrap { padding: 16px 20px 80px; }
.field-group { margin-bottom: 14px; }
.field-label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
input[type=text], input[type=date], input[type=number] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  padding: 11px 13px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
input:focus { border-color: var(--accent-border); background: var(--surface2); }
input::placeholder { color: var(--text-dim); }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
.vs-row { display: flex; align-items: center; gap: 8px; }
.vs-row input { flex: 1; }
.vs-divider { font-family: var(--mono); font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
.score-row { display: grid; grid-template-columns: 1fr auto 1fr auto; align-items: center; gap: 8px; }
.score-row input { text-align: center; }
.score-dash { font-family: var(--mono); color: var(--text-dim); font-size: 14px; }
.checkbox-label {
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  transition: border-color 0.15s;
}
.checkbox-label:hover { border-color: var(--border-hover); }
.checkbox-label.checked { border-color: var(--accent-border); background: var(--accent-dim); }
.checkbox-label input { display: none; }
.check-box {
  width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border-hover);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.checkbox-label.checked .check-box { background: var(--accent); border-color: var(--accent); }
.check-tick { display: none; }
.checkbox-label.checked .check-tick { display: block; }
.check-icon { font-size: 11px; color: #0f1923; font-weight: 700; }
.checkbox-text { font-size: 14px; color: var(--text); }
.submit-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #0f1923;
  font-family: var(--sans); font-size: 15px; font-weight: 600;
  border: none; border-radius: var(--radius); cursor: pointer;
  margin-top: 8px; transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.2px;
}
.submit-btn:active { opacity: 0.85; transform: scale(0.99); }

/* Game list */
.list-wrap { padding: 12px 20px 80px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.filter-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-muted); cursor: pointer;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.game-card:hover { border-color: var(--border-hover); }
.game-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.game-matchup { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
.game-score { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--accent); flex-shrink: 0; margin-left: 12px; }
.game-bottom { display: flex; justify-content: space-between; align-items: center; }
.game-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 10px; flex-wrap: wrap; }
.meta-item { display: flex; align-items: center; gap: 4px; }
.game-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.exp-pill {
  font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
  white-space: nowrap;
}
.exp-pill.claimed { background: var(--green-dim); color: var(--green); border-color: rgba(76,215,160,0.25); }
.exp-pill.pending { background: var(--amber-dim); color: var(--amber); border-color: rgba(245,166,35,0.25); }
.del-btn {
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s;
  line-height: 1;
}
.del-btn:hover { color: var(--red); }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-dim); font-size: 14px; line-height: 1.8;
}
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border-hover);
  color: var(--text); font-size: 13px; padding: 10px 18px;
  border-radius: 20px; z-index: 999; opacity: 0;
  transition: all 0.2s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Bottom nav (mobile feel) */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
@media (max-width: 600px) {
  .bottom-nav { display: flex; }
  .tabs { display: none; }
  .form-wrap, .list-wrap { padding-bottom: 100px; }
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; color: var(--text-dim);
  font-family: var(--sans); font-size: 10px; font-weight: 500; padding: 4px 0;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; line-height: 1; }

/* Section dividers */
.section-date { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.section-date:first-child { margin-top: 0; }

/* No scores note */
.score-note { font-size: 12px; color: var(--text-dim); font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Umpire<span>.</span>log</div>
    <div class="season-tag" id="season-tag">2025/26</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPane('log')">Log game</button>
  <button class="tab" onclick="showPane('games')">Games</button>
</div>

<div class="stats-bar">
  <div class="stat-cell"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Games</div></div>
  <div class="stat-cell"><div class="stat-val green" id="s-claimed">0</div><div class="stat-lbl">Claimed</div></div>
  <div class="stat-cell"><div class="stat-val amber" id="s-pending">0</div><div class="stat-lbl">Pending</div></div>
</div>

<div class="main">
  <!-- LOG PANE -->
  <div class="pane active" id="pane-log">
    <div class="form-wrap">
      <div class="field-group">
        <label class="field-label">Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="field-group">
        <label class="field-label">Teams</label>
        <div class="vs-row" style="margin-bottom:8px;">
          <input type="text" id="f-home" placeholder="Home team" />
          <div class="vs-divider">vs</div>
          <input type="text" id="f-away" placeholder="Away team" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Final score</label>
        <div class="score-row">
          <input type="number" id="f-hscore" placeholder="–" min="0" style="text-align:center;" />
          <div class="score-dash">–</div>
          <input type="number" id="f-ascore" placeholder="–" min="0" style="text-align:center;" />
          <div style="width:1px;"></div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Co-umpire</label>
        <input type="text" id="f-coump" placeholder="Name (leave blank if solo)" />
      </div>
      <div class="field-group">
        <label class="field-label">Expenses</label>
        <label class="checkbox-label" id="exp-label" onclick="toggleCheck()">
          <input type="checkbox" id="f-exp" />
          <div class="check-box">
            <span class="check-tick"><span class="check-icon">✓</span></span>
          </div>
          <span class="checkbox-text">Expenses claimed</span>
        </label>
      </div>
      <button class="submit-btn" onclick="addGame()">Add game</button>
    </div>
  </div>

  <!-- GAMES PANE -->
  <div class="pane" id="pane-games">
    <div class="list-wrap">
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending', this)">Expenses pending</button>
        <button class="filter-btn" onclick="setFilter('claimed', this)">Claimed</button>
      </div>
      <div id="game-list"></div>
    </div>
  </div>
</div>

<!-- Mobile bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-log" onclick="showPane('log')">
    <span class="nav-icon">＋</span>Log
  </button>
  <button class="nav-btn" id="nav-games" onclick="showPane('games')">
    <span class="nav-icon">◉</span>Games
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
let games = JSON.parse(localStorage.getItem('umpire-games') || '[]');
let activeFilter = 'all';
let currentPane = 'log';

function save() { localStorage.setItem('umpire-games', JSON.stringify(games)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleCheck() {
  const cb = document.getElementById('f-exp');
  const lbl = document.getElementById('exp-label');
  cb.checked = !cb.checked;
  lbl.classList.toggle('checked', cb.checked);
}

function showPane(name) {
  currentPane = name;
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && name === 'log') || (i === 1 && name === 'games'));
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  if (name === 'games') render();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addGame() {
  const date = document.getElementById('f-date').value;
  const home = document.getElementById('f-home').value.trim();
  const away = document.getElementById('f-away').value.trim();
  if (!date || !home || !away) { toast('Please fill in date and both teams'); return; }
  const hs = document.getElementById('f-hscore').value;
  const as_ = document.getElementById('f-ascore').value;
  games.unshift({
    id: Date.now(),
    date,
    home,
    away,
    homeScore: hs !== '' ? parseInt(hs) : null,
    awayScore: as_ !== '' ? parseInt(as_) : null,
    coUmpire: document.getElementById('f-coump').value.trim(),
    expensesClaimed: document.getElementById('f-exp').checked
  });
  save();
  ['f-home','f-away','f-hscore','f-ascore','f-coump','f-date'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-exp').checked = false;
  document.getElementById('exp-label').classList.remove('checked');
  updateStats();
  toast('Game logged');
  setTimeout(() => showPane('games'), 400);
}

function toggleExpenses(id) {
  games = games.map(g => g.id === id ? {...g, expensesClaimed: !g.expensesClaimed} : g);
  save(); updateStats(); render();
}

function deleteGame(id) {
  if (!confirm('Delete this game?')) return;
  games = games.filter(g => g.id !== id);
  save(); updateStats(); render();
}

function fmt(d) {
  if (!d) return '';
  const [y,m,dy] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(dy) + ' ' + months[parseInt(m)-1] + ' ' + y;
}

function getSeason() {
  const now = new Date();
  const y = now.getFullYear(); const m = now.getMonth();
  return m >= 8 ? y + '/' + String(y+1).slice(2) : (y-1) + '/' + String(y).slice(2);
}

function updateStats() {
  const claimed = games.filter(g => g.expensesClaimed).length;
  document.getElementById('s-total').textContent = games.length;
  document.getElementById('s-claimed').textContent = claimed;
  document.getElementById('s-pending').textContent = games.length - claimed;
}

function render() {
  let filtered = games;
  if (activeFilter === 'pending') filtered = games.filter(g => !g.expensesClaimed);
  if (activeFilter === 'claimed') filtered = games.filter(g => g.expensesClaimed);

  const list = document.getElementById('game-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">◎</div>' +
      (games.length === 0 ? 'No games logged yet.<br>Tap Log game to add your first.' : 'No games match this filter.') + '</div>';
    return;
  }

  let html = '';
  let lastMonth = '';
  filtered.forEach(g => {
    const mo = g.date ? g.date.slice(0,7) : '';
    if (mo !== lastMonth) {
      const [y,m] = mo.split('-');
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      html += '<div class="section-date">' + months[parseInt(m)-1] + ' ' + y + '</div>';
      lastMonth = mo;
    }
    const score = (g.homeScore !== null && g.awayScore !== null) ? g.homeScore + ' – ' + g.awayScore : '—';
    const expClass = g.expensesClaimed ? 'claimed' : 'pending';
    const expLabel = g.expensesClaimed ? 'Claimed' : 'Pending';
    const coUmp = g.coUmpire ? '<span class="meta-item">with ' + g.coUmpire + '</span>' : '<span class="meta-item">Solo</span>';
    html += `<div class="game-card">
      <div class="game-top">
        <div class="game-matchup">${g.home}<br><span style="color:var(--text-dim);font-size:12px;font-weight:400;">vs</span> ${g.away}</div>
        <div class="game-score">${score}</div>
      </div>
      <div class="game-bottom">
        <div class="game-meta">
          <span class="meta-item">${fmt(g.date)}</span>
          ${coUmp}
        </div>
        <div class="game-actions">
          <span class="exp-pill ${expClass}" onclick="toggleExpenses(${g.id})">${expLabel}</span>
          <button class="del-btn" onclick="deleteGame(${g.id})">✕</button>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

// Init
document.getElementById('season-tag').textContent = getSeason();
document.getElementById('f-date').valueAsDate = new Date();
updateStats();
</script>
</body>
</html>
